repos:
  - repo: local
    hooks:
      - id: conda-version
        name: 'Update conda version'
        entry: './scripts/precommit/conda_version.sh'
        language: script
        files: ^CMakeLists.txt
      
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.0
    hooks:
      - id: clang-format
        files: ^(src|tests)/.*\.(c|cc|cpp|h|hpp)$
